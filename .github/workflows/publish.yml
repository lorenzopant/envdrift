name: Publish to npm

# Triggered by GitHub Releases. Run `pnpm release <patch|minor|major>` to cut
# one — it bumps the version, tags, and creates+publishes the GitHub Release
# end-to-end, which fires this workflow to ship the package to npm.
#
# Uses npm's OIDC trusted publishing: no NPM_TOKEN secret needed. The package
# must first be linked to this repo + workflow on npmjs.com (Settings ->
# Trusted Publisher) — see CONTRIBUTING.md "Releasing".
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing requires a recent npm CLI (>= 11.5.1)
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - run: npm publish --provenance --access public
